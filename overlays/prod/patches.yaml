apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app-deployment
spec:
  replicas: 3  
  template:
    spec: # ◄── Ensure this spec block exists
      imagePullSecrets:
        - name: ghcr-pull-secret  
      containers:
        - name: rag-app-container
          command: ["/bin/sh", "-c"]
          args:
            - |
                python3 -c "print('--- Simulating MLOps Application Runtime ---\nExecuting core system smoke checks...\nAll internal software verifications: PASSED.')"
                while true; do sleep 30; done  # ◄── Keeps the container alive indefinitely
